<body>

    <!-- Estructura básica de un formulario -->
    <form>
        <!-- Etiqueta Label-->
        <!-- sirve para asociar una etiqueta con un campo de formulario -->
        <label for="identificador">Nombre:</label>
        <!-- Estructura del campo del formulario Input -->
        <input type="tipo" id="identificador" size="tamaño" 
        name="nombre" value="Texto por defecto" placeholder="Texto de ayuda en gris">


    </form>
