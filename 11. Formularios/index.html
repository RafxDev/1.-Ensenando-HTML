<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>

    <h1>Formularios</h1>
    <hr>

    <form>

        <!-- Input Texto (permite ingresar texto) -->
        <label for="usuario">Usuario: </label>
        <input type="text" id="usuario" name="usuario" placeholder="Escribe Aqui Tu Usuario">

        <br>

        <!-- Input Contraseña (permite ingresar contraseña que sera tapada por puntos negros) -->
        <label for="password">Contraseña: </label>
        <input type="password" id="password" name="password" placeholder="Escribe Aqui Tu Contraseña">

        <br>

        <!-- Input CheckBox (permite seleccion multiple) -->
        <label for="lenguajes">Lenguajes de Programación que sabe:</label>
        <input type="checkbox" name="lenguajes" id="html">HTML
        <input type="checkbox" name="lenguajes" id="css">CSS
        <input type="checkbox" name="lenguajes" id="javascript">JavaScript
        <input type="checkbox" name="lenguajes" id="python">Python

        <br>

        <!-- Input Radio (permite solo una seleccion) -->
        <label for="conocimiento">Que lenguaje trabajara: </label>
        <input type="radio" name="conocimiento" id="java">Java
        <input type="radio" name="conocimiento" id="python">Python
        <input type="radio" name="conocimiento" id="rust">Rust
        <input type="radio" name="conocimiento" id="cobol">Cobol

        <br>

        <!-- Input Number (permite ingresar solo numeros) -->
        <label for="programando">Años Programando: </label>
        <input type="number" name="programando" id="programando" placeholder="Ingresa Numero Años Programando">

        <br>

        <!-- Input Archivo (permite cargar y subir un archivo) -->
        <label for="archivo">Sube Tu Archivo: </label>
        <input type="file" id="archivo" name="archivo" value="file">

        <!-- Textarea (permite ingresar texto multilinea) -->
        

    </form>
</body>
</html>
